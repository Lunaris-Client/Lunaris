name: lunaris
description: A cross-platform Discourse client.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.7.0
  flutter: ">=3.29.0"

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.7.0
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  go_router: ^14.8.1
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.3.4
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  uuid: ^4.5.1
  url_launcher: ^6.3.1
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.17
  timeago: ^3.7.0
  cupertino_icons: ^1.0.8
  pointycastle: ^3.9.1
  app_links: ^6.3.3
  asn1lib: ^1.5.8
  path_provider: ^2.1.5
  flutter_widget_from_html_core: ^0.17.0
  flutter_local_notifications: ^18.0.0
  workmanager: ^0.7.0
  image_picker: ^1.2.1
  file_picker: ^10.3.10
  connectivity_plus: ^7.0.0
  tray_manager: ^0.5.2
  window_manager: ^0.5.1
  local_auth: ^3.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.14
  freezed: ^2.5.7
  json_serializable: ^6.9.4
  riverpod_generator: ^2.6.3
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.5

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/branding/

flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
  windows:
    generate: true
  macos:
    generate: true
  linux:
    generate: true
  image_path: "assets/branding/icon.png"
  adaptive_icon_background: "#1A1A2E"
  adaptive_icon_foreground: "assets/branding/icon.png"
  remove_alpha_ios: true

flutter_native_splash:
  color: "#1A1A2E"
  image: "assets/branding/logo_text.png"
  android: true
  ios: true
  web: true
  android_12:
    color: "#1A1A2E"
    image: "assets/branding/logo_text.png"
