<?xml version="1.0" encoding="UTF-8"?>
<svg width="2000" height="800" viewBox="0 0 2000 800" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <!-- Deep space background -->
    <radialGradient id="bg" cx="50%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#121A3F"/>
      <stop offset="55%" stop-color="#070B1F"/>
      <stop offset="100%" stop-color="#02030A"/>
    </radialGradient>

    <!-- Full moon gradient -->
    <radialGradient id="moonGrad" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#F2FBFF"/>
      <stop offset="35%" stop-color="#C8F1FF"/>
      <stop offset="70%" stop-color="#79D2FF"/>
      <stop offset="100%" stop-color="#3D5CFF"/>
    </radialGradient>

    <!-- Soft crater shading -->
    <radialGradient id="crater" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#AEE7FF" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#3D5CFF" stop-opacity="0"/>
    </radialGradient>

    <!-- Text gradient -->
    <linearGradient id="textGrad" x1="900" y1="500" x2="1500" y2="650" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#EAFBFF"/>
      <stop offset="50%" stop-color="#B8E6FF"/>
      <stop offset="100%" stop-color="#D6C8FF"/>
    </linearGradient>

    <!-- Glow -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="22" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="2000" height="800" fill="url(#bg)"/>

  <!-- Star field -->
  <g fill="white" opacity="0.7">
    <circle cx="200" cy="120" r="2"/>
    <circle cx="350" cy="200" r="1.5"/>
    <circle cx="1700" cy="150" r="2"/>
    <circle cx="1800" cy="250" r="1.5"/>
    <circle cx="1500" cy="100" r="1.5"/>
    <circle cx="400" cy="600" r="1.3"/>
    <circle cx="1750" cy="650" r="1.3"/>
    <circle cx="1200" cy="300" r="1.2"/>
  </g>

  <!-- Large Full Moon (left aligned for banner composition) -->
  <g filter="url(#glow)">
    <circle cx="650" cy="400" r="260" fill="url(#moonGrad)"/>
  </g>

  <!-- Non-overlapping craters -->
  <circle cx="560" cy="360" r="55" fill="url(#crater)"/>
  <circle cx="760" cy="430" r="70" fill="url(#crater)"/>
  <circle cx="640" cy="520" r="45" fill="url(#crater)"/>

  <!-- Lunaris Text -->
  <text x="1150" y="450"
        font-family="Poppins, Montserrat, Segoe UI, Arial, sans-serif"
        font-size="170"
        font-weight="700"
        letter-spacing="6"
        fill="url(#textGrad)">
    Lunaris
  </text>

</svg>
